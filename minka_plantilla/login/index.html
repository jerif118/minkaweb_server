<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Web</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1></h1>
        </div>
        <div class="content">
            <div class="left-section">
                <div class="download-app">
                    <p>Descarga Minka en tu Android</p>
                    <button>Obtener la aplicación</button>
                </div>
                <h2>Usa Minka en tu computadora</h2>
                <ol>
                    <li>Abre Minka en tu teléfono.</li>
                    <li>Toca <strong>Menú</strong> en Android</li>
                    <li>Toca <strong>Dispositivos vinculados</strong> y, luego, <strong>Vincular un dispositivo</strong>.</li>
                    <li>Apunta tu teléfono hacia esta pantalla para escanear el código QR.</li>
                </ol>
                <a href="#" class="link-phone">Vincular con el número de teléfono</a>
            </div>
            <div class="right-section">
                <div class="qr-code">
                    <img src="./image/qrmuestra.png" alt="QR Code">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
